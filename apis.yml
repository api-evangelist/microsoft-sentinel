aid: microsoft-sentinel
name: Microsoft Sentinel
description: >-
  Microsoft Sentinel is a cloud-native security information and event management
  (SIEM) and security orchestration, automation, and response (SOAR) solution.
  It provides REST APIs for managing incidents, analytics rules, threat
  intelligence, and automation playbooks.
